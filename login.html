<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap — İskandinavya Turu</title>
    <meta name="description" content="İskandinavya Turu premium portala giriş yapın.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark:       #070a13;
            --bg-card:       rgba(255, 255, 255, 0.02);
            --border-glow:   rgba(255, 255, 255, 0.06);
            --accent:        #6366f1;
            --accent-light:  #a5b4fc;
            --font-main:     'Plus Jakarta Sans', sans-serif;
            --font-heading:  'Outfit', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background: var(--bg-dark);
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated background ── */
        .bg-aura {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-aura::before {
            content: '';
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99,102,241,.18) 0%, transparent 70%);
            top: -200px;
            left: -180px;
            animation: driftA 18s ease-in-out infinite alternate;
        }
        .bg-aura::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(36,144,184,.12) 0%, transparent 70%);
            bottom: -150px;
            right: -100px;
            animation: driftB 22s ease-in-out infinite alternate;
        }
        @keyframes driftA {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(60px, 80px) scale(1.15); }
        }
        @keyframes driftB {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(-50px, -60px) scale(1.2); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(165, 180, 252, 0.15);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

        /* ── Card ── */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 48px 44px 40px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 0 0 1px rgba(99,102,241,.08),
                0 32px 64px rgba(0,0,0,.55),
                0 0 80px rgba(99,102,241,.06);
            animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Glow border shimmer */
        .login-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 25px;
            background: linear-gradient(135deg,
                rgba(99,102,241,.25) 0%,
                transparent 40%,
                transparent 60%,
                rgba(36,144,184,.15) 100%);
            z-index: -1;
            animation: shimmerBorder 6s ease-in-out infinite alternate;
        }
        @keyframes shimmerBorder {
            from { opacity: 0.5; }
            to   { opacity: 1; }
        }

        /* ── Brand ── */
        .brand {
            text-align: center;
            margin-bottom: 36px;
        }
        .brand-icon {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 14px;
            animation: bobble 3s ease-in-out infinite;
        }
        @keyframes bobble {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-6px); }
        }
        .brand h1 {
            font-family: var(--font-heading);
            font-size: 1.85rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(99,102,241,.3));
            line-height: 1.1;
        }
        .brand p {
            font-size: 0.8rem;
            color: #6b7280;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,.1), transparent);
            margin-bottom: 32px;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 10px;
        }
        .form-label .label-icon { font-size: 0.9rem; }

        .input-wrap {
            position: relative;
        }
        .input-wrap input {
            width: 100%;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 12px;
            padding: 14px 46px 14px 18px;
            font-family: var(--font-main);
            font-size: 0.95rem;
            font-weight: 500;
            color: #f3f4f6;
            outline: none;
            transition: border-color .25s, box-shadow .25s, background .25s;
            letter-spacing: 0.2px;
        }
        .input-wrap input::placeholder { color: #4b5563; }
        .input-wrap input:focus {
            border-color: rgba(99,102,241,.5);
            background: rgba(99,102,241,.05);
            box-shadow: 0 0 0 3px rgba(99,102,241,.12), 0 4px 16px rgba(0,0,0,.3);
        }

        /* Copy button */
        .copy-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #6b7280;
            font-size: 1rem;
            padding: 4px;
            border-radius: 6px;
            transition: color .2s, background .2s;
            display: flex;
            align-items: center;
        }
        .copy-btn:hover {
            color: var(--accent-light);
            background: rgba(165,180,252,.1);
        }
        .copy-btn.copied { color: #34d399; }

        /* Password toggle */
        .toggle-pw {
            position: absolute;
            right: 44px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #6b7280;
            font-size: 1rem;
            padding: 4px;
            border-radius: 6px;
            transition: color .2s, background .2s;
            display: flex;
            align-items: center;
        }
        .toggle-pw:hover {
            color: var(--accent-light);
            background: rgba(165,180,252,.1);
        }

        /* Password strength */
        .strength-bar {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }
        .strength-seg {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,.07);
            transition: background .4s ease;
        }
        .strength-seg.s1 { background: #ef4444; }
        .strength-seg.s2 { background: #f97316; }
        .strength-seg.s3 { background: #eab308; }
        .strength-seg.s4 { background: #22c55e; }
        .strength-label {
            font-size: 0.65rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #6b7280;
            margin-top: 6px;
            font-weight: 600;
            min-height: 14px;
            transition: color .4s;
        }

        /* ── Credential Preview Card ── */
        .cred-preview {
            background: rgba(99,102,241,.05);
            border: 1px solid rgba(99,102,241,.18);
            border-radius: 14px;
            padding: 16px 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: border-color .3s, background .3s;
        }
        .cred-preview:hover {
            border-color: rgba(99,102,241,.35);
            background: rgba(99,102,241,.09);
        }
        .cred-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, #2490b8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(99,102,241,.35);
        }
        .cred-info { flex: 1; overflow: hidden; }
        .cred-name {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1rem;
            color: #e5e7eb;
            letter-spacing: 0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cred-role {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-light);
            margin-top: 3px;
            font-weight: 600;
        }
        .cred-badge {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(52,211,153,.12);
            border: 1px solid rgba(52,211,153,.25);
            color: #34d399;
        }

        /* ── Login Button ── */
        .login-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent) 0%, #4f46e5 100%);
            color: #fff;
            box-shadow: 0 8px 24px rgba(99,102,241,.35);
            transition: transform .2s, box-shadow .2s, filter .2s;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }
        .login-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity .3s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(99,102,241,.5);
            filter: brightness(1.08);
        }
        .login-btn:hover::before { opacity: 1; }
        .login-btn:active { transform: translateY(0); }
        .login-btn.loading {
            pointer-events: none;
            filter: brightness(0.85);
        }
        .login-btn .btn-text { display: inline-flex; align-items: center; gap: 8px; }
        .btn-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .login-btn.loading .btn-text-label { display: none; }
        .login-btn.loading .btn-spinner { display: block; }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(15,18,30,.95);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #e5e7eb;
            backdrop-filter: blur(16px);
            box-shadow: 0 12px 32px rgba(0,0,0,.5);
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform .4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity .4s;
            opacity: 0;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast-icon { font-size: 1.1rem; }

        /* ── Footer ── */
        .card-footer {
            text-align: center;
            margin-top: 24px;
        }
        .card-footer a {
            font-size: 0.72rem;
            color: #6b7280;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: color .2s;
        }
        .card-footer a:hover { color: var(--accent-light); }
        .card-footer a span { color: var(--accent); font-weight: 700; }

        /* ── Responsive ── */
        @media (max-width: 520px) {
            .login-card { padding: 36px 24px 30px; margin: 16px; }
            .brand h1 { font-size: 1.55rem; }
        }
    </style>
</head>
<body>

    <!-- Ambient background -->
    <div class="bg-aura"></div>
    <div class="particles" id="particles"></div>

    <!-- Toast notification -->
    <div class="toast" id="toast">
        <span class="toast-icon" id="toastIcon">📋</span>
        <span id="toastMsg">Kopyalandı!</span>
    </div>

    <!-- Login Card -->
    <div class="login-card" role="main">

        <!-- Brand -->
        <div class="brand">
            <span class="brand-icon">✈️</span>
            <h1>İskandinavya Turu</h1>
            <p>Premium Portal Girişi</p>
        </div>

        <div class="divider"></div>

        <!-- Credential Preview -->
        <div class="cred-preview" title="Kayıtlı hesap bilgileri">
            <div class="cred-avatar">👤</div>
            <div class="cred-info">
                <div class="cred-name">Emre_Zehra_2026</div>
                <div class="cred-role">Yönetici Hesabı</div>
            </div>
            <div class="cred-badge">✓ Aktif</div>
        </div>

        <!-- Form -->
        <form id="loginForm" autocomplete="off" novalidate>

            <!-- Username -->
            <div class="form-group">
                <label class="form-label" for="username">
                    <span class="label-icon">👤</span> Kullanıcı Adı
                </label>
                <div class="input-wrap">
                    <input
                        id="username"
                        type="text"
                        placeholder="Kullanıcı adınızı girin"
                        aria-label="Kullanıcı adı"
                        autocomplete="username"
                        required
                    >
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label" for="password">
                    <span class="label-icon">🔒</span> Şifre
                </label>
                <div class="input-wrap">
                    <input
                        id="password"
                        type="password"
                        placeholder="Şifrenizi girin"
                        aria-label="Şifre"
                        autocomplete="current-password"
                        required
                    >
                    <button
                        type="button"
                        class="toggle-pw"
                        id="togglePw"
                        title="Şifreyi göster/gizle"
                        aria-label="Şifreyi göster"
                    >👁️</button>
                </div>

                <!-- Strength bar -->
                <div class="strength-bar" aria-hidden="true">
                    <div class="strength-seg" id="seg1"></div>
                    <div class="strength-seg" id="seg2"></div>
                    <div class="strength-seg" id="seg3"></div>
                    <div class="strength-seg" id="seg4"></div>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>

            <!-- Submit -->
            <button type="submit" class="login-btn" id="loginBtn">
                <span class="btn-text">
                    <div class="btn-spinner" id="btnSpinner"></div>
                    <span class="btn-text-label">Giriş Yap &nbsp;→</span>
                </span>
            </button>
        </form>

        <!-- Footer -->
        <div class="card-footer">
            <a href="index.html">← <span>Ana Sayfaya</span> Dön</a>
        </div>

    </div><!-- /login-card -->

    <script>
        /* ══════════════════════════════════════════
           GÜVENLİK: Hash'ler kod içinde değil,
           Firebase Realtime Database'de tutulur.
           Giriş sırasında Firebase'den çekilir ve
           Web Crypto API (SHA-256) ile karşılaştırılır.
        ══════════════════════════════════════════ */

        /* ── Firebase endpoints ── */
        const FB_KEY  = 'https://smartpack-31275-default-rtdb.europe-west1.firebasedatabase.app/scanTour/key.json';
        const FB_PASS = 'https://smartpack-31275-default-rtdb.europe-west1.firebasedatabase.app/scanTour/pass.json';

        /* ── Double SHA-256 helper (Web Crypto API) ── */
        async function sha256(text) {
            const enc = new TextEncoder();
            // 1. tur
            const buf1 = await crypto.subtle.digest('SHA-256', enc.encode(text));
            const hex1 = Array.from(new Uint8Array(buf1))
                .map(b => b.toString(16).padStart(2, '0')).join('');
            // 2. tur — hash'in hash'i
            const buf2 = await crypto.subtle.digest('SHA-256', enc.encode(hex1));
            return Array.from(new Uint8Array(buf2))
                .map(b => b.toString(16).padStart(2, '0')).join('');
        }

        /* ── Firebase'den hash çek ── */
        async function fetchHash(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error('Firebase bağlantı hatası');
            return await res.json();
        }

        /* ── Particles ── */
        const container = document.getElementById('particles');
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 5 + 3;
            p.style.cssText = `
                width:${size}px; height:${size}px;
                left:${Math.random()*100}%;
                animation-duration:${Math.random()*14+10}s;
                animation-delay:${Math.random()*12}s;
                opacity:${Math.random()*.4+.05};
            `;
            container.appendChild(p);
        }

        /* ── Toast helper ── */
        let toastTimer;
        function showToast(msg, icon = '📋') {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            document.getElementById('toastIcon').textContent = icon;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
        }

        /* ── Copy helper ── */
        function copyText(text, btn, label) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '✅';
                btn.classList.add('copied');
                showToast(label + ' kopyalandı!', '✅');
                setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 2000);
            }).catch(() => showToast('Kopyalanamadı.', '❌'));
        }

        /* ── Password strength meter ── */
        const pwInput = document.getElementById('password');
        const segs    = [1,2,3,4].map(i => document.getElementById('seg'+i));
        const label   = document.getElementById('strengthLabel');
        const colorMap = { 1:'#ef4444', 2:'#f97316', 3:'#eab308', 4:'#22c55e' };
        const textMap  = {
            0: '',
            1: '⚠️ Çok Zayıf',
            2: '🔶 Zayıf',
            3: '🔷 Orta',
            4: '🛡️ Çok Güçlü'
        };
        function calcStrength(pw) {
            let score = 0;
            if (pw.length >= 8)  score++;
            if (pw.length >= 12) score++;
            if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            return Math.min(score, 4);
        }
        pwInput.addEventListener('input', () => {
            const s = calcStrength(pwInput.value);
            segs.forEach((seg, idx) => {
                seg.className = 'strength-seg';
                seg.style.background = idx < s ? colorMap[s] : 'rgba(255,255,255,.07)';
            });
            label.textContent = pwInput.value ? textMap[s] : '';
            label.style.color = s > 0 ? colorMap[s] : '#6b7280';
        });

        /* ── Toggle password visibility ── */
        const toggleBtn = document.getElementById('togglePw');
        let shown = false;
        toggleBtn.addEventListener('click', () => {
            shown = !shown;
            pwInput.type = shown ? 'text' : 'password';
            toggleBtn.textContent = shown ? '🙈' : '👁️';
            toggleBtn.title = shown ? 'Şifreyi gizle' : 'Şifreyi göster';
        });

        /* ── Error shake animation ── */
        function shakeCard() {
            const card = document.querySelector('.login-card');
            card.style.animation = 'none';
            card.style.transform = 'translateX(-8px)';
            setTimeout(() => card.style.transform = 'translateX(8px)', 80);
            setTimeout(() => card.style.transform = 'translateX(-5px)', 160);
            setTimeout(() => card.style.transform = 'translateX(5px)', 240);
            setTimeout(() => card.style.transform = 'translateX(0)', 320);
        }

        /* ── Login form — Firebase + SHA-256 authentication ── */
        const form = document.getElementById('loginForm');
        const btn  = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.classList.add('loading');

            const enteredUser = document.getElementById('username').value.trim();
            const enteredPass = pwInput.value;

            try {
                /* 1) Firebase'den hash'leri ve girilen değerlerin hash'ini paralel çek */
                const [storedKey, storedPass, userHash, passHash] = await Promise.all([
                    fetchHash(FB_KEY),
                    fetchHash(FB_PASS),
                    sha256(enteredUser),
                    sha256(enteredPass)
                ]);

                /* 2) Karşılaştır */
                if (userHash === storedKey && passHash === storedPass) {
                    btn.classList.remove('loading');
                    showToast('Giriş başarılı! Yönlendiriliyorsunuz…', '🚀');
                    setTimeout(() => { window.location.href = 'index.html'; }, 1800);
                } else {
                    btn.classList.remove('loading');
                    shakeCard();
                    showToast('Kullanıcı adı veya şifre hatalı!', '❌');
                    pwInput.value = '';
                    pwInput.dispatchEvent(new Event('input'));
                }
            } catch (err) {
                btn.classList.remove('loading');
                shakeCard();
                showToast('Sunucu bağlantısı kurulamadı!', '⚠️');
                console.error('Firebase fetch error:', err);
            }
        });
    </script>
</body>
</html>
